<script>
  window.__omrDeps = false;
  function omrLoad(list, done){
    var i = 0;
    function next(){
      if (i >= list.length){ done && done(); return; }
      var s = document.createElement("script");
      s.src = list[i].urls[list[i].at || 0];
      s.onload = function(){ i++; next(); };
      s.onerror = function(){
        list[i].at = (list[i].at || 0) + 1;
        if (list[i].at >= list[i].urls.length){
          document.getElementById("root").innerHTML =
            '<div style="font-family:sans-serif;padding:40px;text-align:center;color:#54656f">Could not load OmniReply. Please open this page in Safari or Chrome.</div>';
          return;
        }
        next();
      };
      document.head.appendChild(s);
    }
    next();
  }
</script>

  ], function(){
    window.__omrDeps = true;
    var src = document.getElementById("omr-src").textContent;
    try {
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      (0, eval)(out);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="font-family:sans-serif;padding:40px;text-align:center;color:#e53935">Build error: ' + (e && e.message ? e.message : e) + '</div>';
    }
  });
</script>

/* ---------- atoms ---------- */
function Logo(props){
  var sz = props.sz || "w-8 h-8 text-sm";
  return (
    <span className="inline-flex items-center gap-2 font-bold">
      <span className={"rounded-lg bg-[" + GREEN + "] text-white grid place-items-center font-black " + sz}>O</span>
      <span className={ink}>OmniReply</span>
    </span>
  );
}
function Btn(props){
  var kind = props.kind || "primary";
  var k = kind === "primary"
    ? "bg-[" + GREEN + "] hover:bg-[" + GREEN_D + "] text-white"
    : kind === "ghost"
    ? "bg-transparent hover:bg-[#f0f2f5] dark:hover:bg-[#2a3942] " + ink + " border border-[#e9edef] dark:border-[#2a3942]"
    : "bg-[#f0f2f5] dark:bg-[#2a3942] " + ink;
  return (
    <button onClick={props.onClick}
      className={"px-5 py-2.5 rounded-xl text-sm font-semibold transition " + k + " " + (props.className || "")}>
      {props.children}
    </button>
  );
}
function Eyebrow(props){
  return (
    <div className="inline-flex items-center gap-2 mb-3">
      <span className={"w-6 h-px bg-[" + GREEN + "]"}></span>
      <span className={"text-xs font-bold uppercase tracking-widest text-[" + GREEN_D + "] dark:text-[#25d366]"}>{props.children}</span>
    </div>
  );
}

              <div className="flex -space-x-2">
                {["AR","DT","NH","FH"].map(function(x,i){
                  return <span key={i} className="w-8 h-8 rounded-full bg-[#dfe5e7] dark:bg-[#2a3942] ring-2 ring-white dark:ring-[#0b141a] grid place-items-center text-[10px] font-semibold text-[#54656f] dark:text-[#8696a0]">{x}</span>;
                })}
              </div>
              <span className={"text-xs " + mut}>{t.trust}</span>
            </div>
          </div>
          <div className="omr-rise" style={{animationDelay:"120ms"}}>
            <div className="mb-3 text-center">
              <span className={"text-xs font-semibold uppercase tracking-wide " + mut}>{t.demo_label}</span>
            </div>
            <PhoneDemo t={t} step={step} online={lang === "en" ? "online" : "dalam talian"} />
          </div>
        </div>
      </section>

      {/* problem + stats */}
      <section className="max-w-6xl mx-auto px-5 py-16">
        <div className="grid lg:grid-cols-2 gap-10 items-start">
          <div>
            <Eyebrow>{t.problem_eyebrow}</Eyebrow>
            <h2 className={"text-2xl md:text-3xl font-bold leading-snug " + ink}>{t.problem_h}</h2>
            <p className={"mt-4 leading-relaxed " + mut}>{t.problem_body}</p>
          </div>
          <div className="grid sm:grid-cols-3 gap-3">
            {[[t.stat1n,t.stat1],[t.stat2n,t.stat2],[t.stat3n,t.stat3]].map(function(s,i){
              return (
                <div key={i} className={card + " p-5"}>
                  <div className={"text-3xl font-black text-[" + GREEN + "]"}>{s[0]}</div>
                  <div className={"text-xs mt-2 leading-snug " + mut}>{s[1]}</div>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {/* features */}
      <section id="features" className="max-w-6xl mx-auto px-5 py-16">
        <div className="text-center max-w-2xl mx-auto mb-10">
          <Eyebrow>{t.feat_eyebrow}</Eyebrow>
          <h2 className={"text-2xl md:text-3xl font-bold " + ink}>{t.feat_h}</h2>
        </div>
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {t.features.map(function(f,i){
            return (
              <div key={i} className={card + " p-5 transition hover:-translate-y-0.5 hover:shadow-sm"}>
                <div className="w-10 h-10 rounded-xl bg-[#e7f4ef] dark:bg-[#0c2e27] grid place-items-center text-lg mb-3">{f[2]}</div>
                <div className={"font-semibold " + ink}>{f[0]}</div>
                <div className={"text-sm mt-1 leading-relaxed " + mut}>{f[1]}</div>
              </div>
            );
          })}
        </div>
      </section>

      {/* how it works */}
      <section id="how" className="max-w-6xl mx-auto px-5 py-16">
        <div className="text-center max-w-2xl mx-auto mb-10">
          <Eyebrow>{t.how_eyebrow}</Eyebrow>
          <h2 className={"text-2xl md:text-3xl font-bold " + ink}>{t.how_h}</h2>
        </div>
        <div className="grid md:grid-cols-3 gap-4">
          {t.how.map(function(s,i){
            return (
              <div key={i} className="relative">
                <div className={card + " p-6 h-full"}>
                  <div className={"w-9 h-9 rounded-full bg-[" + GREEN + "] text-white grid place-items-center font-bold mb-3"}>{i+1}</div>
                  <div className={"font-semibold " + ink}>{s[0]}</div>
                  <div className={"text-sm mt-1 leading-relaxed " + mut}>{s[1]}</div>
                </div>
                {i < 2 ? <span className={"hidden md:block absolute top-1/2 -right-2 text-[" + GREEN + "]"}>→</span> : null}
              </div>
            );
          })}
        </div>
      </section>

      {/* pricing */}
      <section id="pricing" className="max-w-6xl mx-auto px-5 py-16">
        <div className="text-center max-w-2xl mx-auto mb-10">
          <Eyebrow>{t.price_eyebrow}</Eyebrow>
          <h2 className={"text-2xl md:text-3xl font-bold " + ink}>{t.price_h}</h2>
        </div>
        <div className="grid md:grid-cols-3 gap-4 max-w-4xl mx-auto">
          {t.plans.map(function(p,i){
            var pop = p[4];
            return (
              <div key={i} className={card + " p-6 relative " + (pop ? "ring-2 ring-[" + GREEN + "]" : "")}>
                {pop ? <span className={"absolute -top-3 left-1/2 -translate-x-1/2 text-[11px] font-semibold px-3 py-1 rounded-full bg-[" + GREEN + "] text-white"}>{t.price_most}</span> : null}
                <div className={"font-bold " + ink}>{p[0]}</div>
                <div className="my-2">
                  <span className={"text-3xl font-black " + ink}>RM{p[1]}</span>
                  <span className={mut}>{t.price_per}</span>
                </div>
                <ul className="space-y-2 my-4">
                  {p[3].map(function(f,j){
                    return <li key={j} className={"text-sm flex gap-2 " + mut}><span className={"text-[" + GREEN + "]"}>✓</span>{f}</li>;
                  })}
                </ul>
                <button onClick={go} className="w-full">
                  <Btn kind={pop ? "primary" : "ghost"} className="w-full">{t.price_cta}</Btn>
                </button>
              </div>
            );
          })}
        </div>
      </section>

      {/* faq */}
      <section id="faq" className="max-w-3xl mx-auto px-5 py-16">
        <div className="text-center mb-10">
          <Eyebrow>{t.faq_eyebrow}</Eyebrow>
          <h2 className={"text-2xl md:text-3xl font-bold " + ink}>{t.faq_h}</h2>
        </div>
        <div className="space-y-3">
          {t.faq.map(function(f,i){
            return <Faq key={i} q={f[0]} a={f[1]} open={faqOpen === i} onClick={function(){ setFaqOpen(faqOpen === i ? -1 : i); }} />;
          })}
        </div>
      </section>

      {/* final cta */}
      <section className="max-w-6xl mx-auto px-5 pb-20">
        <div className={"rounded-3xl bg-[" + GREEN_D + "] text-white px-8 py-14 text-center relative overflow-hidden"}>
          <div className="absolute inset-0 opacity-10 omr-grid-bg"></div>
          <div className="relative">
            <h2 className="text-2xl md:text-4xl font-black leading-tight max-w-2xl mx-auto">{t.final_h}</h2>
            <p className="mt-4 text-white/85 max-w-lg mx-auto">{t.final_sub}</p>
            <button onClick={go} className="mt-7">
              <span className={"inline-block px-7 py-3.5 rounded-xl bg-white text-[" + GREEN_D + "] font-bold text-base hover:bg-white/90 transition"}>{t.final_cta} →</span>
            </button>
          </div>
        </div>
      </section>

      {/* footer */}
      <footer className="border-t border-[#e9edef] dark:border-[#2a3942]">
        <div className="max-w-6xl mx-auto px-5 py-10 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div>
            <Logo />
            <p className={"text-xs mt-2 " + mut}>{t.foot_tag}</p>
          </div>
          <p className={"text-xs " + mut}>© 2026 OmniReply · {t.foot_rights}</p>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
