<style>
  :root{
    --green:#00a884; --green-d:#008f72; --green-25:#25d366;

    --card:#ffffff; --bubble:#d9fdd3; --chatbg:#efeae2; --pageBg:#ffffff;
  }
  html.dark{
    --ink:#e9edef; --mut:#8696a0; --surf:#2a3942; --line:#2a3942;
    --card:#202c33; --bubble:#005c4b; --chatbg:#0b141a; --pageBg:#0b141a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--pageBg); color:var(--ink); -webkit-text-size-adjust:100%; line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  .narrow{max-width:760px;margin:0 auto;padding:0 20px}
  header.nav{position:sticky;top:0;z-index:30;background:var(--pageBg);border-bottom:1px solid var(--line)}
  .nav-in{height:62px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:17px}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:900;font-size:15px}
  .nav-links{display:none;gap:26px;font-size:14px;font-weight:500}
  .nav-links a{color:var(--mut)}
  .nav-tools{display:flex;align-items:center;gap:8px}
  .pill{font-size:12px;font-weight:700;padding:7px 10px;border-radius:9px;background:var(--surf);color:var(--ink);border:none;cursor:pointer}
  .btn{display:inline-block;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--green);color:#fff;transition:background .15s}
  .btn:hover{background:var(--green-d)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.lg{padding:14px 24px;font-size:16px}
  .btn.block{display:block;width:100%;text-align:center}
  .btn.white{background:#fff;color:var(--green-d)}
  .hide-sm{display:none}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px}
  .eyebrow .ln{width:24px;height:1px;background:var(--green)}
  .eyebrow span{font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--green-d)}
  html.dark .eyebrow span{color:var(--green-25)}
  .hero{position:relative;overflow:hidden}
  .grid-bg{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(#d7e0e2 1px,transparent 1px);background-size:22px 22px}
  html.dark .grid-bg{background-image:radial-gradient(#1d2a31 1px,transparent 1px)}
  .hero-in{position:relative;display:grid;grid-template-columns:1fr;gap:42px;align-items:center;padding:52px 0 76px}
  h1.h{font-size:34px;line-height:1.1;font-weight:900;letter-spacing:-.02em}
  .lead{margin-top:18px;font-size:17px;color:var(--mut);max-width:520px}
  .cta-row{margin-top:26px;display:flex;flex-wrap:wrap;gap:12px}
  .note{margin-top:15px;font-size:12px;color:var(--mut)}
  .proof{margin-top:26px;display:flex;align-items:center;gap:12px}
  .stack-av{display:flex}
  .stack-av .av{width:32px;height:32px;border-radius:50%;background:#dfe5e7;border:2px solid var(--pageBg);display:grid;place-items:center;font-size:10px;font-weight:700;color:#54656f;margin-left:-8px}
  html.dark .stack-av .av{background:#2a3942;color:#8696a0}
  .stack-av .av:first-child{margin-left:0}
  .proof .ptxt{font-size:12px;color:var(--mut)}
  .demo-label{text-align:center;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin-bottom:12px}
  .phone{position:relative;width:290px;margin:0 auto}
  .phone .frame{border-radius:38px;background:#111b21;padding:10px;box-shadow:0 24px 50px rgba(0,0,0,.28)}
  .phone .screen{border-radius:30px;overflow:hidden;background:var(--chatbg)}
  .phone .top{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--green-d);color:#fff}
  .phone .top .av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:12px;font-weight:600}
  .phone .top .nm{font-size:14px;font-weight:600;line-height:1.1}
  .phone .top .on{font-size:11px;color:rgba(255,255,255,.8)}
  .phone .pbody{padding:12px;min-height:226px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:82%;padding:8px 12px;border-radius:12px;font-size:13px;box-shadow:0 1px 1px rgba(0,0,0,.05)}
  .msg.them{align-self:flex-start;background:var(--card);border-top-left-radius:4px;color:var(--ink)}
  .msg.me{align-self:flex-end;background:var(--bubble);border-top-right-radius:4px;color:var(--ink);animation:pop .35s ease both}
  .tag{position:absolute;left:50%;bottom:-12px;transform:translateX(-50%);white-space:nowrap;font-size:11px;font-weight:700;padding:6px 12px;border-radius:999px;background:var(--card);border:1px solid var(--line);box-shadow:0 4px 12px rgba(0,0,0,.08);color:var(--green-d)}
  html.dark .tag{color:var(--green-25)}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  section{padding:60px 0}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 38px}
  h2.h{font-size:26px;font-weight:800;line-height:1.25}
  .body-txt{margin-top:16px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px}
  .stats{display:grid;grid-template-columns:1fr;gap:12px}
  .stat{padding:20px}
  .stat .n{font-size:30px;font-weight:900;color:var(--green)}
  .stat .l{font-size:12px;color:var(--mut);margin-top:8px}
  .two{display:grid;grid-template-columns:1fr;gap:40px;align-items:start}
  .feat-grid{display:grid;grid-template-columns:1fr;gap:12px}
  .feat{padding:20px}
  .feat .ic{width:40px;height:40px;border-radius:12px;background:#e7f4ef;display:grid;place-items:center;font-size:18px;margin-bottom:12px}
  html.dark .feat .ic{background:#0c2e27}
  .feat .t{font-weight:700}
  .feat .d{font-size:14px;color:var(--mut);margin-top:4px}
  .how-grid{display:grid;grid-template-columns:1fr;gap:16px}
  .step{padding:24px}
  .step .num{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:700;margin-bottom:12px}
  .step .t{font-weight:700}
  .step .d{font-size:14px;color:var(--mut);margin-top:4px}
  .price-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:840px;margin:0 auto}
  .plan{padding:24px;position:relative}
  .plan.pop{outline:2px solid var(--green)}
  .plan .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--green);color:#fff}
  .plan .nm{font-weight:700}
  .plan .pr{margin:8px 0}
  .plan .pr .amt{font-size:30px;font-weight:900}
  .plan .pr .per{color:var(--mut)}
  .plan ul{list-style:none;margin:16px 0}
  .plan li{font-size:14px;color:var(--mut);display:flex;gap:8px;margin:8px 0}
  .plan li .ck{color:var(--green);font-weight:700}
  .faq-list{display:flex;flex-direction:column;gap:12px}
  .faq button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;text-align:left;background:none;border:none;cursor:pointer;color:var(--ink)}
  .faq .q{font-size:14px;font-weight:700}
  .faq .pl{font-size:20px;color:var(--mut);transition:transform .2s;flex-shrink:0}
  .faq.open .pl{transform:rotate(45deg)}
  .faq .a{padding:0 20px 16px;font-size:14px;color:var(--mut);display:none}
  .faq.open .a{display:block}
  .final{border-radius:24px;background:var(--green-d);color:#fff;padding:54px 28px;text-align:center;position:relative;overflow:hidden}
  .final .grid-bg{opacity:.1}
  .final h2{font-size:28px;font-weight:900;line-height:1.2;max-width:560px;margin:0 auto;position:relative}
  .final p{margin:16px auto 0;color:rgba(255,255,255,.85);max-width:460px;position:relative}
  .final .btn{margin-top:26px;position:relative}
  footer{border-top:1px solid var(--line)}
  .foot{display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center;padding:40px 0}
  .foot .ft{font-size:12px;color:var(--mut);margin-top:8px}
  .foot .cp{font-size:12px;color:var(--mut)}
  @media(min-width:640px){
    .stats{grid-template-columns:repeat(3,1fr)}
    .feat-grid{grid-template-columns:1fr 1fr}
    .foot{flex-direction:row;justify-content:space-between;text-align:left}
    .hide-sm{display:inline-block}
  }
  @media(min-width:768px){
    h1.h{font-size:46px}
    .nav-links{display:flex}
    .how-grid{grid-template-columns:repeat(3,1fr)}
    .price-grid{grid-template-columns:repeat(3,1fr)}
    .two{grid-template-columns:1fr 1fr}
    .final h2{font-size:34px}
  }
  @media(min-width:980px){
    .hero-in{grid-template-columns:1fr 1fr}
    .feat-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

  var lang = "en";
  var htmlEl = document.documentElement;
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  function buildFeatures(t){
    var box=document.getElementById("featGrid"); var h=""; var i;
    for(i=0;i<t.features.length;i++){
      var f=t.features[i];
      h+='<div class="card feat"><div class="ic">'+f[0]+'</div><div class="t">'+esc(f[1])+'</div><div class="d">'+esc(f[2])+'</div></div>';
    }
    box.innerHTML=h;
  }
  function buildHow(t){
    var box=document.getElementById("howGrid"); var h=""; var i;
    for(i=0;i<t.how.length;i++){
      h+='<div class="card step"><div class="num">'+(i+1)+'</div><div class="t">'+esc(t.how[i][0])+'</div><div class="d">'+esc(t.how[i][1])+'</div></div>';
    }
    box.innerHTML=h;
  }
  function buildPrice(t){
    var box=document.getElementById("priceGrid"); var h=""; var i,j;
    for(i=0;i<t.plans.length;i++){
      var p=t.plans[i]; var pop=p[3];
      h+='<div class="card plan'+(pop?" pop":"")+'">';
      if(pop){h+='<div class="badge">'+esc(t.price_most)+'</div>';}
      h+='<div class="nm">'+esc(p[0])+'</div>';
      h+='<div class="pr"><span class="amt">RM'+esc(p[1])+'</span><span class="per">'+esc(t.price_per)+'</span></div>';
      h+='<ul>';
      for(j=0;j<p[2].length;j++){h+='<li><span class="ck">\u2713</span>'+esc(p[2][j])+'</li>';}
      h+='</ul>';
      h+='<a class="btn block'+(pop?"":" ghost")+'" href="https://unifiws-tt.github.io/omnireply.html">'+esc(t.price_cta)+'</a>';
      h+='</div>';
    }
    box.innerHTML=h;
  }
  function buildFaq(t){
    var box=document.getElementById("faqList"); var h=""; var i;
    for(i=0;i<t.faq.length;i++){
      h+='<div class="card faq"><button data-fi="'+i+'"><span class="q">'+esc(t.faq[i][0])+'</span><span class="pl">+</span></button><div class="a">'+esc(t.faq[i][1])+'</div></div>';
    }
    box.innerHTML=h;
    var btns=box.querySelectorAll("button[data-fi]"); var k;
    for(k=0;k<btns.length;k++){
      btns[k].onclick=function(){
        var faq=this.parentNode;
        var wasOpen=faq.className.indexOf("open")>-1;
        var all=box.querySelectorAll(".faq"); var m;
        for(m=0;m<all.length;m++){all[m].className="card faq";}
        if(!wasOpen){faq.className="card faq open";}
      };
    }
  }
  function apply(){
    var t=T[lang];
    var nodes=document.querySelectorAll("[data-i]"); var i;
    for(i=0;i<nodes.length;i++){
      var key=nodes[i].getAttribute("data-i");
      if(t[key]!==undefined){ nodes[i].textContent=t[key]; }
    }
    document.getElementById("onlineTxt").textContent=t.online;
    document.getElementById("langBtn").textContent=(lang==="en")?"BM":"EN";
    buildFeatures(t); buildHow(t); buildPrice(t); buildFaq(t);
  }

  document.getElementById("langBtn").onclick=function(){ lang=(lang==="en")?"bm":"en"; apply(); };
  document.getElementById("darkBtn").onclick=function(){
    var on=htmlEl.className.indexOf("dark")>-1;
    htmlEl.className=on?"":"dark";
    document.getElementById("darkBtn").innerHTML=on?"\ud83c\udf19":"\u2600\ufe0f";
  };

  apply();
})();
