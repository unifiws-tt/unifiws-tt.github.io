<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTF Admin Tools</title>
<style>
  body { font-family: system-ui; max-width: 420px; margin: 40px auto; padding: 16px; background: #f9f9f9; }
  h2 { font-size: 16px; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #888; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
  button { width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.4; }
  .result { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 13px; word-break: break-all; }
  .ok { background: #e6f4ea; color: #1a7a3a; }
  .err { background: #fdecea; color: #c0392b; }
</style>
</head>
<body>
<h2>YTF — Set Password</h2>
<div class="sub">Target: unifiws@gmail.com (REAL, agency)</div>
<label>Internal Secret</label>
<input type="text" id="secret" placeholder="YTF_INTERNAL_SECRET" autocapitalize="off" autocorrect="off" spellcheck="false" />
<label>User ID</label>
<input type="text" id="uid" value="0ed0cb3d-4f04-4928-875d-6ed3ad4ae972" autocapitalize="off" autocorrect="off" spellcheck="false" />
<label>New Password</label>
<input type="text" id="pw" value="Ytf2026!" autocapitalize="off" autocorrect="off" spellcheck="false" />
<button id="btn" onclick="run()">Set Password</button>
<div id="result"></div>
<script>
async function run() {
  var btn = document.getElementById('btn');
  var res = document.getElementById('result');
  var secret = document.getElementById('secret').value.trim();
  var uid = document.getElementById('uid').value.trim();
  var pw = document.getElementById('pw').value;
  if (!secret || !uid || !pw) { res.className = 'result err'; res.textContent = 'Fill all fields'; return; }
  btn.disabled = true;
  btn.textContent = 'Calling...';
  res.textContent = '';
  try {
    var r = await fetch('https://jmtcdegcsrxjenxjnxse.supabase.co/functions/v1/ytf-set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: secret, user_id: uid, password: pw })
    });
    var j = await r.json();
    if (j.ok) { res.className = 'result ok'; res.textContent = 'Done! Password set for ' + j.email; }
    else { res.className = 'result err'; res.textContent = 'Status ' + r.status + ' — ' + JSON.stringify(j) + ' (typed len=' + secret.length + ')'; }
  } catch(e) {
    res.className = 'result err'; res.textContent = 'Fetch failed: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = 'Set Password';
}
</script>
</body>
</html>
