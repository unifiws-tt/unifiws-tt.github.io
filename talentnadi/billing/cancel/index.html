<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Pembayaran Dibatalkan — TalentNadi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1E2A52;
    --coral:#FF6B5E;
    --bg:#F6F7FB;
    --card:#FFFFFF;
    --muted:#6B7280;
    --line:#E5E7EB;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--navy);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:430px}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    padding:36px 28px;
    text-align:center;
    box-shadow:0 10px 40px rgba(30,42,82,0.08);
  }
  .badge{
    width:72px;height:72px;border-radius:50%;
    background:rgba(255,107,94,0.12);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 20px;
  }
  .badge svg{width:36px;height:36px}
  h1{font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-0.02em}
  p.lead{font-size:15px;line-height:1.55;color:var(--muted);margin-bottom:24px}
  .btn{
    display:block;width:100%;
    background:var(--navy);color:#fff;
    text-decoration:none;font-size:15px;font-weight:600;
    padding:14px;border-radius:14px;transition:opacity .15s ease;
    margin-bottom:12px;
  }
  .btn:active{opacity:.85}
  .btn.ghost{
    background:transparent;color:var(--navy);
    border:1px solid var(--line);
  }
  .foot{margin-top:14px;font-size:12px;color:var(--muted)}
  .foot a{color:var(--coral);text-decoration:none;font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF6B5E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </div>
      <h1>Pembayaran Dibatalkan</h1>
      <p class="lead">Tiada caj dikenakan. Anda boleh cuba semula bila-bila masa.</p>

      <a class="btn" href="https://unifiws-tt.github.io/talentnadi-billing.html">Cuba Semula</a>
      <a class="btn ghost" href="https://unifiws-tt.github.io/talentnadi-billing.html">Kembali ke Billing</a>

      <p class="foot">Ada masalah? Hubungi <a href="mailto:support@talentnadi.com">support@talentnadi.com</a></p>
    </div>
  </div>
</body>
</html>
