<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pembayaran Dibatalkan — TalentNadi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #1E2A52;
    --coral: #FF6B5E;
    --bg: #F7F8FB;
    --ink: #1E2A52;
    --muted: #6B7390;
    --card: #FFFFFF;
    --line: #E7EAF2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 430px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 26px 30px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(30, 42, 82, 0.07);
  }
  .badge {
    width: 76px; height: 76px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: rgba(255, 107, 94, 0.12);
    display: flex; align-items: center; justify-content: center;
  }
  .badge svg { width: 38px; height: 38px; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
  .sub { font-size: 15px; color: var(--muted); line-height: 1.55; margin-bottom: 28px; }
  .btn {
    display: block;
    width: 100%;
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.06s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-ghost {
    background: transparent;
    color: var(--navy);
    border: 1px solid var(--line);
    margin-top: 10px;
  }
  .brand {
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .brand b { color: var(--navy); font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF6B5E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </div>
      <h1>Pembayaran Dibatalkan</h1>
      <p class="sub">Tiada caj dikenakan. Anda boleh cuba semula bila-bila masa — akaun anda kekal seperti sedia ada.</p>

      <a class="btn" href="https://unifiws-tt.github.io/talentnadi-billing.html">Cuba Semula</a>
      <a class="btn btn-ghost" href="https://unifiws-tt.github.io/talentnadi-billing.html">Kembali ke Billing</a>

      <div class="brand"><b>TalentNadi</b> — nadi bakat syarikat anda</div>
    </div>
  </div>
</body>
</html>
