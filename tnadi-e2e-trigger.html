<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TalentNadi E2E Trigger (s41)</title>
<style>
  body { font-family: -apple-system, Inter, sans-serif; background:#1E2A52; color:#fff; margin:0; padding:16px; max-width:430px; }
  h1 { font-size:18px; color:#FF6B5E; }
  .card { background:#28365f; border-radius:12px; padding:14px; margin:10px 0; }
  .q { font-weight:600; margin:8px 0 6px; font-size:14px; }
  .opt { display:block; background:#1E2A52; border:1px solid #3a4a78; border-radius:8px; padding:10px; margin:5px 0; font-size:13px; cursor:pointer; }
  .opt.sel { border-color:#FF6B5E; background:#3a2a30; }
  button { background:#FF6B5E; color:#fff; border:0; border-radius:8px; padding:12px 18px; font-size:15px; font-weight:600; width:100%; margin-top:10px; }
  input { width:100%; padding:10px; border-radius:8px; border:1px solid #3a4a78; background:#1E2A52; color:#fff; box-sizing:border-box; margin:6px 0; }
  pre { background:#11182f; padding:10px; border-radius:8px; font-size:11px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
  .ok { color:#4ade80; } .err { color:#FF6B5E; }
  small { color:#9aa7c7; }
</style>
</head>
<body>
<h1>TalentNadi E2E Trigger</h1>
<small>SHIPKIT v14.4d admin trigger - gated, delete after use. s41 wire test.</small>

<div class="card">
  <label>Gate secret</label>
  <input id="gate" type="password" placeholder="enter gate secret">
  <label>Invite token</label>
  <input id="token" type="text" value="0de6073fd1c31fa55e2fd1abdb6ddfad">
  <button onclick="loadQ()">1. Deliver Questions</button>
</div>

<div id="qbox"></div>
<div id="out" class="card" style="display:none"><pre id="outpre"></pre></div>

<script>
var BASE = "https://jmtcdegcsrxjenxjnxse.supabase.co/functions/v1/";
var ANON = "sb_publishable_ufUjg7d8sbcyFCZUv1JvCg_0hAuhzm3";
var GATE = "tnadi-s41-e2e";
var answers = {};
var qData = null;

function show(obj, cls) {
  var o = document.getElementById("out");
  o.style.display = "block";
  var p = document.getElementById("outpre");
  p.className = cls || "";
  p.textContent = (typeof obj === "string") ? obj : JSON.stringify(obj, null, 2);
}

function api(path, body, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open("POST", BASE + path, true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("apikey", ANON);
  xhr.setRequestHeader("Authorization", "Bearer " + ANON);
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      var data;
      try { data = JSON.parse(xhr.responseText); } catch (e) { data = xhr.responseText; }
      cb(xhr.status, data);
    }
  };
  xhr.send(JSON.stringify(body));
}

function loadQ() {
  if (document.getElementById("gate").value !== GATE) { show("Wrong gate secret.", "err"); return; }
  var token = document.getElementById("token").value;
  show("Loading questions...");
  api("tnadi-deliver-questions", { invite_token: token }, function (status, data) {
    if (status !== 200) { show({ http: status, body: data }, "err"); return; }
    qData = data;
    renderQ(data);
    show({ http: status, lens: data.lens, question_count: data.questions.length }, "ok");
  });
}

function renderQ(data) {
  var box = document.getElementById("qbox");
  var html = "<div class='card'><b>Lens:</b> " + data.lens.primary + " (raw " + data.lens.primary_raw + ")</div>";
  for (var i = 0; i < data.questions.length; i++) {
    var q = data.questions[i];
    html += "<div class='card'><div class='q'>" + (i + 1) + ". " + q.scenario + "</div>";
    for (var j = 0; j < q.options.length; j++) {
      var o = q.options[j];
      html += "<label class='opt' id='opt_" + q.id + "_" + o.id + "' onclick='pick(\"" + q.id + "\",\"" + o.id + "\")'>" + o.id + ") " + o.text + "</label>";
    }
    html += "</div>";
  }
  html += "<button onclick='pickAllA()'>Auto-fill all (a) = BEST</button>";
  html += "<button onclick='submitScore()'>2. Submit & Score</button>";
  box.innerHTML = html;
}

function pick(qid, oid) {
  answers[qid] = oid;
  for (var i = 0; i < qData.questions.length; i++) {
    var q = qData.questions[i];
    if (q.id === qid) {
      for (var j = 0; j < q.options.length; j++) {
        var el = document.getElementById("opt_" + qid + "_" + q.options[j].id);
        if (el) el.className = (q.options[j].id === oid) ? "opt sel" : "opt";
      }
    }
  }
}

function pickAllA() {
  for (var i = 0; i < qData.questions.length; i++) { pick(qData.questions[i].id, "a"); }
}

function submitScore() {
  var token = document.getElementById("token").value;
  show("Scoring...");
  api("tnadi-score", { invite_token: token, answers: answers }, function (status, data) {
    show({ http: status, result: data }, status === 200 ? "ok" : "err");
  });
}
</script>
</body>
</html>
