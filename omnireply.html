function loadSeq(urls, onok, onfail){
  var i=0;
  function tryNext(){
    if(i>=urls.length){onfail&&onfail();return;}
    var s=document.createElement('script');
    s.src=urls[i++];
    s.onload=function(){onok&&onok();};
    s.onerror=function(){tryNext();};
    document.head.appendChild(s);
  }
  tryNext();
}
</script>

    <>

      <div style={{position:"fixed",top:0,right:0,bottom:0,width:270,zIndex:900,background:T.surface,display:"flex",flexDirection:"column",boxShadow:"-4px 0 20px #0004",maxWidth:"80vw"}}>
        <div style={{padding:"16px 16px 14px",background:"#00a88412",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:16,fontWeight:800,color:T.text}}>{C.more}</div><div style={{fontSize:11,color:T.muted}}>OmniReply AI</div></div>
          <button onClick={()=>setShowDrawer(false)} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.text,padding:0}}><Ico n="x" s={15}/></button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
          {[{k:"kb",i:"kb",l:C.kb||"KB"},{k:"analytics",i:"chart",l:C.analytics},{k:"marketing",i:"megaphone",l:L==="bm"?"Pemasaran":"Marketing"},{k:"assets",i:"copy",l:C.assets},{k:"csat",i:"check",l:C.csat},{k:"settings",i:"cog",l:C.settings}].map(it=>(
            <button key={it.k} onClick={()=>{setTab(it.k);setShowDrawer(false);setChat(null);setCProfile(null);}} style={{width:"100%",display:"flex",alignItems:"center",gap:13,padding:"13px 18px",background:tab===it.k?"#00a88410":"none",border:"none",cursor:"pointer",textAlign:"left"}}>
              <span style={{color:tab===it.k?"#00a884":T.muted,display:"flex",width:22}}><Ico n={it.i} s={19}/></span>
              <span style={{fontSize:14,fontWeight:tab===it.k?700:500,color:tab===it.k?"#00a884":T.text}}>{it.l}</span>
            </button>
          ))}
          <div style={{height:1,background:T.divider,margin:"8px 18px"}}/>
          <button onClick={()=>{setShowP(true);setShowDrawer(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:13,padding:"13px 18px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
            <span style={{color:"#f59e0b",display:"flex",width:22}}><Ico n="crown" s={19}/></span>
            <span style={{fontSize:14,fontWeight:600,color:"#f59e0b"}}>{C.upgrade}</span>
          </button>
        </div>
      </div>
    </>
  );


  /* \u2550\u2550 ConnectWA \u2014 Baileys QR + risk-ack gate (locked screen 14) \u2550\u2550 */
  const ConnectWA = () => {
    const steps=[C.waStep1,C.waStep2,C.waStep3];
    const stepIdx = waStep==="risk"?0:waStep==="qr"?1:2;
    const Stepper = () => (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 14px",background:T.header,borderBottom:`1px solid ${T.border}`}}>
        {steps.map((s,i)=>(
          <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:20,height:20,borderRadius:"50%",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:i<=stepIdx?"#00a884":T.card,color:i<=stepIdx?"#fff":T.muted,border:`1px solid ${i<=stepIdx?"#00a884":T.border}`}}>{i<stepIdx?"\u2713":i+1}</span>
              <span style={{fontSize:11,fontWeight:i===stepIdx?700:400,color:i===stepIdx?T.text:T.muted}}>{s}</span>
            </div>
            {i<steps.length-1&&<span style={{width:14,height:2,borderRadius:1,background:i<stepIdx?"#00a884":T.border}}/>}
          </div>
        ))}
      </div>
    );
    const reset=()=>{setShowWA(false);setWaStep("risk");setWaAck(false);};
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
        <H title={C.connectWA} back={reset} right={<LangToggle/>}/>
        <Stepper/>
        <div style={{flex:1,overflowY:"auto",padding:16}}>
          {waStep==="risk"&&(
            <>
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:40,marginBottom:6}}>\U0001F4F1</div>
                <div style={{fontSize:17,fontWeight:800,color:T.text,marginBottom:4}}>{C.riskTitle}</div>
                <div style={{fontSize:12,color:T.muted,lineHeight:1.6,maxWidth:320,margin:"0 auto"}}>{C.riskBody}</div>
              </div>
              <div style={{background:"#f59e0b10",border:"1px solid #f59e0b28",borderRadius:13,padding:14,marginBottom:12}}>
                {[C.risk1,C.risk2,C.risk3].map((r,i)=>(
                  <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:i<2?`1px solid ${T.divider}`:"none"}}>
                    <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{i===0?"\u26A0\uFE0F":i===1?"\U0001F422":"\U0001F512"}</span>
                    <span style={{fontSize:12,color:T.text,lineHeight:1.55}}>{r}</span>
                  </div>
                ))}
              </div>
              <div onClick={()=>setWaAck(!waAck)} style={{display:"flex",alignItems:"center",gap:11,padding:13,background:T.surface,border:`1px solid ${waAck?"#00a884":T.border}`,borderRadius:12,cursor:"pointer",marginBottom:14}}>
                <span style={{width:22,height:22,borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:waAck?"#00a884":"transparent",border:`2px solid ${waAck?"#00a884":T.muted}`,color:"#fff",fontSize:13,fontWeight:700}}>{waAck?"\u2713":""}</span>
                <span style={{fontSize:13,fontWeight:600,color:T.text}}>{C.riskAck}</span>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={reset} style={{flex:1,padding:13,background:"transparent",border:`1px solid ${T.border}`,borderRadius:12,color:T.text,fontSize:13,fontWeight:600,cursor:"pointer"}}>{C.riskBack}</button>
                <button disabled={!waAck} onClick={()=>setWaStep("qr")} style={{flex:2,padding:13,background:waAck?"#00a884":T.card,border:"none",borderRadius:12,color:waAck?"#fff":T.muted,fontSize:14,fontWeight:700,cursor:waAck?"pointer":"not-allowed",opacity:waAck?1:.6}}>{C.riskAckCta}</button>
              </div>
            </>
          )}
          {waStep==="qr"&&(
            <>
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:16,fontWeight:800,color:T.text,marginBottom:4}}>{C.qrTitle}</div>
                <div style={{fontSize:12,color:T.muted,lineHeight:1.6,maxWidth:300,margin:"0 auto"}}>{C.qrSteps}</div>
              </div>
              <div style={{width:220,height:220,margin:"0 auto 14px",background:"#fff",borderRadius:16,padding:14,boxShadow:"0 4px 20px #00000018",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{width:"100%",height:"100%",backgroundImage:"repeating-linear-gradient(0deg,#111 0 8px,#fff 8px 16px),repeating-linear-gradient(90deg,#111 0 8px,transparent 8px 16px)",backgroundBlendMode:"multiply",borderRadius:4,position:"relative",opacity:.92}}>
                  <div style={{position:"absolute",inset:"38% 38%",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6}}><span style={{fontSize:20}}>\U0001F4AC</span></div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:16}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:"#00a884",display:"inline-block"}}/>
                <span style={{fontSize:12,color:T.muted}}>{C.qrWaiting}</span>
              </div>
              <button style={{width:"100%",padding:11,background:"#00a88415",border:"1px solid #00a88822",borderRadius:11,color:"#00a884",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:8}}>\U0001F504 {C.qrRefresh}</button>
              <button onClick={()=>{setWaStep("done");setWaLive(true);}} style={{width:"100%",padding:13,background:"#00a884",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>{C.waStep3} \u2192</button>
            </>
          )}
          {waStep==="done"&&(
            <>
              <div style={{textAlign:"center",marginBottom:16,paddingTop:8}}>
                <div style={{width:72,height:72,borderRadius:"50%",background:"#00a88420",border:"2px solid #00a884",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 12px"}}>\u2713</div>
                <div style={{fontSize:18,fontWeight:800,color:T.text,marginBottom:4}}>{C.waConnected}</div>
                <div style={{fontSize:12,color:T.muted,lineHeight:1.6,maxWidth:300,margin:"0 auto"}}>{C.waConnectedSub}</div>
              </div>
              <div style={{background:T.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${T.border}`,marginBottom:14}}>
                {[[C.waNumber,"+60 12-888 0001",null],[C.waSession,C.waLive,"#00a884"]].map(([l,v,c],i,arr)=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 15px",borderBottom:i<arr.length-1?`1px solid ${T.divider}`:"none"}}>
                    <span style={{fontSize:13,color:T.text}}>{l}</span>
                    {c?<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{fontSize:13,fontWeight:700,color:c}}>{v}</span></span>:<span style={{fontSize:13,color:T.muted,fontWeight:600}}>{v}</span>}
                  </div>
                ))}
              </div>
              <button onClick={reset} style={{width:"100%",padding:13,background:"#00a884",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>{C.waDoneBtn}</button>
              <button onClick={()=>{setWaLive(false);setWaStep("risk");}} style={{width:"100%",padding:11,background:"transparent",border:"1px solid #ef444433",borderRadius:11,color:"#ef4444",fontSize:12,fontWeight:600,cursor:"pointer"}}>{C.waDisconnect}</button>
            </>
          )}
        </div>
      </div>
    );
  };

  /* ── TABS ── */
  const TABS=[{k:"chats",i:"chat",l:{bm:"Sembang",en:"Chats"},badge:contacts.reduce((s,c)=>s+c.unread,0)},{k:"broadcast",i:"broadcast",l:{bm:"Broadcast",en:"Broadcast"}},{k:"contacts",i:"contacts",l:{bm:"Kenalan",en:"Contacts"}},{k:"automation",i:"zap",l:{bm:"Auto",en:"Auto"}},{k:"more",i:"menu",l:{bm:"Lagi",en:"More"}}];

  const Screen = () => {
    if(showWA)            return <ConnectWA/>;
    if(tab==="chats")     return chat?<ChatView/>:<ChatList/>;
    if(tab==="broadcast") return <Broadcast/>;
    if(tab==="contacts")  return cProfile?<ContactProfile c={cProfile}/>:<Contacts/>;
    if(tab==="csat")      return <CSAT/>;
    if(tab==="assets")    return <Assets/>;
    if(tab==="kb")        return <KB/>;
    if(tab==="analytics") return <Analytics/>;
    if(tab==="marketing") return <Marketing/>;
    if(tab==="automation")return <Automations/>;
    if(tab==="settings")  return <Settings/>;
    return null;
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg,fontFamily:"'Helvetica Neue',Arial,sans-serif",color:T.text,maxWidth:430,margin:"0 auto",overflow:"hidden",position:"relative"}}>
      <style>{`*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{display:none}button{font-family:inherit;cursor:pointer}`}</style>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}><Screen/></div>
      {!(tab==="chats"&&chat)&&!cProfile&&!showWA&&(
        <div style={{display:"flex",background:T.header,borderTop:`1px solid ${T.border}`,padding:"4px 0 max(4px,env(safe-area-inset-bottom))",flexShrink:0}}>
          {TABS.map(t=>{
            const moreActive=t.k==="more"&&["more","kb","analytics","marketing","assets","csat","settings"].includes(tab);
            const active=tab===t.k||moreActive;
            return(
            <button key={t.k} onClick={()=>{ if(t.k==="more"){setShowDrawer(true);return;} setTab(t.k);setChat(null);setCProfile(null);if(t.k!=="settings")setSettSec(null);if(t.k!=="marketing"){setSelFW(null);setFwTab("guide");}if(t.k==="broadcast"){setBcView("list");setBcDetail(null);} }} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",padding:"4px 0",position:"relative"}}>
              <span style={{color:active?"#00a884":T.muted,display:"flex"}}><Ico n={t.i} s={20}/></span>
              <span style={{fontSize:8,color:active?"#00a884":T.muted,fontWeight:active?700:400}}>{t.l[L]}</span>
              {t.badge>0&&<span style={{position:"absolute",top:2,right:"14%",width:14,height:14,borderRadius:"50%",background:"#00a884",color:"#fff",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
              {active&&<span style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:16,height:2,borderRadius:1,background:"#00a884"}}/>}
            </button>
            );
          })}
        </div>
      )}
      {showOB&&<Onboarding/>}
      {showP&&<Pricing/>}
      {showFWPicker&&<FWPicker/>}
      {showDrawer&&<Drawer/>}
      <ProdModal/>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
window.addEventListener('load', function(){
  function fail(what){document.getElementById('root').innerHTML='<pre style="padding:16px;color:#b00;white-space:pre-wrap;font:13px monospace">'+what+' failed to load from all CDNs.\n\nFix: open this page in SAFARI (not the in-app browser). Tap the ••• menu -> Open in Safari.</pre>';}
  function run(){
    var src=document.getElementById('src').textContent;
  try{
    var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code;
    var f=new Function(out);
    f();
  }catch(e){
    document.getElementById('root').innerHTML='<pre style="padding:16px;color:#b00;white-space:pre-wrap;font:12px monospace">BUILD ERROR: '+(e&&e.message?e.message:e)+'</pre>';
    console.error(e);
  }
  }
  // load deps in sequence then run
  loadSeq(['https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js','https://unpkg.com/react@18/umd/react.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'],
    function(){
      loadSeq(['https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js','https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'],
        function(){
          loadSeq(['https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js','https://unpkg.com/@babel/standalone/babel.min.js','https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'],
            function(){ run(); },
            function(){ fail('Babel'); });
        }, function(){ fail('ReactDOM'); });
    }, function(){ fail('React'); });
});
</script>
</body>
</html>
